services:
  - type: web
    name: house-backend
    plan: free
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python build_all.py
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker src.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
